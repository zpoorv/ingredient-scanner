name: Search Index Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  sync-search-index:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Algolia search indices
        env:
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_PRODUCTS_INDEX_NAME: ${{ secrets.ALGOLIA_PRODUCTS_INDEX_NAME }}
          ALGOLIA_SUGGESTIONS_INDEX_NAME: ${{ secrets.ALGOLIA_SUGGESTIONS_INDEX_NAME }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          OPEN_FOOD_FACTS_DATASET_URL: ${{ secrets.OPEN_FOOD_FACTS_DATASET_URL }}
          SEARCH_INDEX_MAX_PRODUCTS: ${{ secrets.SEARCH_INDEX_MAX_PRODUCTS }}
        run: npm run search:index
